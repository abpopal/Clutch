<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled Athletics • Messages</title>
  <link rel="stylesheet" href="styles.css?v=20260508e">
  <script type="module" src="js/app.js?v=20260508e"></script>
  <script type="module" src="js/messages.js?v=20260508e"></script>
  <style>
    .msg-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100dvh - 60px);
      overflow: hidden;
    }

    /* Conversation list */
    .msg-sidebar {
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .msg-sidebar-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .msg-sidebar-title {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .msg-convo-list {
      flex: 1;
      overflow-y: auto;
    }

    .msg-convo-item {
      display: flex;
      flex-direction: column;
      gap: .2rem;
      padding: .875rem 1.25rem;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background .12s;
    }

    .msg-convo-item:hover,
    .msg-convo-item.active { background: var(--surface); }

    .msg-convo-name {
      font-size: .9375rem;
      font-weight: 600;
      color: var(--text);
    }

    .msg-convo-preview {
      font-size: .8125rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-convo-time {
      font-size: .75rem;
      color: var(--muted);
    }

    .msg-empty-list {
      padding: 2rem 1.25rem;
      font-size: .875rem;
      color: var(--muted);
      text-align: center;
    }

    /* Thread panel */
    .msg-thread {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .msg-thread-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }

    .msg-thread-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: .75rem;
      color: var(--muted);
      font-size: .9375rem;
    }

    .msg-thread-empty-icon { font-size: 2.5rem; }

    .msg-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .msg-bubble-row {
      display: flex;
      gap: .625rem;
      align-items: flex-end;
    }

    .msg-bubble-row.mine { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 68%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: .625rem .875rem;
      font-size: .9375rem;
      color: var(--text);
      line-height: 1.5;
    }

    .msg-bubble-row.mine .msg-bubble {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-bubble-row:not(.mine) .msg-bubble {
      border-bottom-left-radius: 4px;
    }

    .msg-bubble-time {
      font-size: .7rem;
      color: var(--muted);
      padding: 0 .25rem;
      white-space: nowrap;
    }

    .msg-compose {
      border-top: 1px solid var(--line);
      padding: .875rem 1.25rem;
      display: flex;
      gap: .75rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .msg-compose-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: .9375rem;
      padding: .65rem .875rem;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color .15s;
    }

    .msg-compose-input:focus { border-color: var(--accent); }

    .msg-send-btn {
      background: var(--brand);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: .875rem;
      font-weight: 700;
      padding: .65rem 1.25rem;
      transition: opacity .15s;
      white-space: nowrap;
    }

    .msg-send-btn:hover { opacity: .85; }
    .msg-send-btn:disabled { opacity: .5; cursor: default; }

    .msg-status {
      font-size: .75rem;
      color: var(--muted);
      padding: .25rem 1.25rem;
      min-height: 1.25rem;
      flex-shrink: 0;
    }

    @media (max-width: 680px) {
      .msg-layout { grid-template-columns: 1fr; }
      .msg-sidebar { display: none; }
      .msg-sidebar.show { display: flex; }
    }
  </style>
</head>
<body data-page="messages" data-requires-session="true">
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">UA</div>
      <span class="role-pill" id="role-pill">guest</span>
    </div>
    <div>
      <p class="nav-label">Main</p>
      <nav class="nav">
        <a class="nav-btn" data-nav="home" href="index.html"><span class="nav-icon">🏠</span><span class="nav-text">Home</span></a>
        <a class="nav-btn" data-nav="pulse" href="pulse.html"><span class="nav-icon">⚡</span><span class="nav-text">Pulse</span></a>
        <a class="nav-btn" data-nav="search" href="explore.html"><span class="nav-icon">🔍</span><span class="nav-text">Explore</span></a>
        <a class="nav-btn" data-nav="profile" href="profile.html"><span class="nav-icon">👤</span><span class="nav-text">Profile</span></a>
        <a class="nav-btn" data-nav="messages" href="messages.html"><span class="nav-icon">💬</span><span class="nav-text">Messages</span></a>
        <a class="nav-btn" data-nav="scout-dashboard" data-role-allow="scout" href="scout-dashboard.html"><span class="nav-icon">📋</span><span class="nav-text">Scout Hub</span></a>
        <a class="nav-btn" data-nav="school-dashboard" data-role-allow="school_admin" href="school-dashboard.html"><span class="nav-icon">🏫</span><span class="nav-text">School</span></a>
      </nav>
    </div>
    <div class="sidebar-foot">
      <button class="btn-ghost full" id="sign-out-btn">Sign out</button>
    </div>
  </aside>

  <div class="mobile-overlay" id="mobile-overlay"></div>

  <div class="page-wrap" style="overflow:hidden;">
    <header class="site-header" data-shared-header></header>
    <main style="overflow:hidden;height:100%;">
      <div class="msg-layout">

        <!-- Conversation List -->
        <div class="msg-sidebar">
          <div class="msg-sidebar-head">
            <span class="msg-sidebar-title">💬 Messages</span>
            <button class="ua-btn ua-btn--primary ua-btn--sm" id="new-convo-btn">+ New</button>
          </div>
          <div id="convo-list" class="msg-convo-list">
            <div class="msg-empty-list">Loading conversations…</div>
          </div>
        </div>

        <!-- Thread Panel -->
        <div class="msg-thread" id="msg-thread">
          <div class="msg-thread-empty" id="thread-empty">
            <span class="msg-thread-empty-icon">💬</span>
            <span>Select a conversation to start messaging.</span>
          </div>
          <div id="thread-head" class="msg-thread-head" hidden></div>
          <div id="msg-messages" class="msg-messages" hidden></div>
          <div id="msg-status" class="msg-status"></div>
          <div id="msg-compose" class="msg-compose" hidden>
            <textarea id="msg-input" class="msg-compose-input" placeholder="Type a message…" rows="1"></textarea>
            <button id="msg-send-btn" class="msg-send-btn">Send</button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
</body>
</html>
