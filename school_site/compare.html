<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled Athletics • Compare Athletes</title>
  <link rel="stylesheet" href="styles.css?v=20260508e">
  <link rel="stylesheet" href="compare.css?v=20260508e">
  <script type="module" src="js/app.js?v=20260508e"></script>
  <script type="module" src="js/compare.js?v=20260508e"></script>
</head>
<body data-page="compare" data-requires-session="true">
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">UA</div>
      <span class="role-pill" id="role-pill">guest</span>
    </div>
    <div>
      <p class="nav-label">Main</p>
      <nav class="nav">
        <a class="nav-btn" data-nav="home" href="index.html"><span class="nav-icon">🏠</span><span class="nav-text">Home</span></a>
        <a class="nav-btn" data-nav="pulse" href="pulse.html"><span class="nav-icon">⚡</span><span class="nav-text">Pulse</span></a>
        <a class="nav-btn" data-nav="search" href="explore.html"><span class="nav-icon">🔍</span><span class="nav-text">Explore</span></a>
        <a class="nav-btn" data-nav="profile" href="profile.html"><span class="nav-icon">👤</span><span class="nav-text">Profile</span></a>
        <a class="nav-btn" data-nav="messages" href="messages.html"><span class="nav-icon">💬</span><span class="nav-text">Messages</span></a>
        <a class="nav-btn" data-nav="scout-dashboard" data-role-allow="scout" href="scout-dashboard.html"><span class="nav-icon">📋</span><span class="nav-text">Scout Hub</span></a>
        <a class="nav-btn" data-nav="school-dashboard" data-role-allow="school_admin" href="school-dashboard.html"><span class="nav-icon">🏫</span><span class="nav-text">School</span></a>
      </nav>
    </div>
    <div class="sidebar-foot">
      <button class="btn-ghost full" id="sign-out-btn">Sign out</button>
    </div>
  </aside>

  <div class="mobile-overlay" id="mobile-overlay"></div>

  <div class="page-wrap">
    <header class="site-header" data-shared-header></header>
    <main class="cmp-main">

      <div class="cmp-page-header">
        <h1 class="cmp-page-title">Compare Athletes</h1>
        <p class="cmp-page-sub">Select two athletes and a shared sport to compare stats side by side.</p>
      </div>

      <div class="cmp-selector-card">
        <div class="cmp-selector-row">
          <div class="cmp-selector-col">
            <label class="cmp-label">Athlete A</label>
            <select id="compare-athlete-a" class="cmp-select"><option value="">Select athlete…</option></select>
          </div>
          <div class="cmp-vs">VS</div>
          <div class="cmp-selector-col">
            <label class="cmp-label">Athlete B</label>
            <select id="compare-athlete-b" class="cmp-select"><option value="">Select athlete…</option></select>
          </div>
          <div class="cmp-selector-col">
            <label class="cmp-label">Sport</label>
            <select id="compare-sport" class="cmp-select"><option value="">Select sport…</option></select>
          </div>
        </div>
        <div class="cmp-actions">
          <button id="compare-btn" class="ua-btn ua-btn--primary">Compare</button>
        </div>
      </div>

      <div id="compare-status" class="cmp-status"></div>

      <div id="compare-stage" class="cmp-stage">
        <div class="cmp-empty">
          <div class="cmp-empty-icon">⚖</div>
          <p>Choose two athletes and a sport to see their stats head-to-head.</p>
        </div>
      </div>

    </main>
  </div>
</div>
</body>
</html>
